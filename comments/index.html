<script class="diversity-config" data-name="gitalk" type="application/json">{"enable":true,"loading":true,"github_id":"xhzlumi","repo":"xhzlumi.github.io","client_id":"Ov23lippjAyifKhPgT9H","client_secret":"b5eedb1973481be30a80c8588cd0188228e3e8fa","admin_user":"xhzlumi","distraction_free_mode":true,"proxy":"https://cors-anywhere.azm.workers.dev/https://github.com/login/oauth/access_token","issue_term":"pathname","language":"zh-CN","js":"https://unpkg.com/gitalk/dist/gitalk.min.js"}</script>

<script>
    const loadGitalk = () => {
        const loadingElement = document.getElementById('loading-gitalk');
        // 配色方案刷新，重新加载评论
        // 加载提示被隐藏，需要再次显示
        loadingElement?.classList.remove('hidden');

        let gitalkId;
        let number = -1;
        // 加载评论模块
        Diversity.utils.loadComments('.gitalk-wrap')
            .then(() => Diversity.utils.getScript(conf.gitalk.js, {
                condition: window.Gitalk
            }))
            .then(() => {
                let issueTerm = conf.gitalk.issue_term;
                if (issueTerm === 'pathname') 
                    gitalkId = window.location.pathname;
                else if (issueTerm === 'url')
                    gitalkId = window.location.href;
                else if (issueTerm === 'title')
                    gitalkId = window.document.title;
                else if (Diversity.validate.test('pNum', issueTerm)) {
                    number = parseInt(issueTerm, 10);
                }
            })
            .then(() => {
                if (gitalkId)
                    Diversity.log("GitHub issue label is [" + gitalkId + "]");
                let confgObj = {
                    clientID: conf.gitalk.client_id,
                    clientSecret: conf.gitalk.client_secret,
                    repo: conf.gitalk.repo,
                    owner: conf.gitalk.github_id,
                    admin: [conf.gitalk.admin_user],
                    id: gitalkId,
                    labels: [],
                    number: number,
                    proxy: conf.gitalk.proxy,
                    distractionFreeMode: conf.gitalk.distraction_free_mode
                }
                if (conf.gitalk.language)
                    confgObj.language = conf.gitalk.language;
                const gitalk = new Gitalk(confgObj);
                gitalk.render(document.querySelector('.gitalk-wrap'));
            });

        // Gitalk加载检测（Gitalk通过DOM渲染，非iframe方案）
        const observeGitalkLoaded = () => {
            const container = document.querySelector('.gitalk-wrap');
            if (!container) return;
            const observer = new MutationObserver((mutations, obs) => {
                if (container.querySelector('.gt-container')) {
                    loadingElement?.classList.add('hidden');
                    obs.disconnect();
                }
            });
            observer.observe(container, { childList: true, subtree: true });
        };
        observeGitalkLoaded();
    }

    document.addEventListener('page:loaded', loadGitalk);
    document.addEventListener('color-scheme:refresh', loadGitalk);
</script></section>
